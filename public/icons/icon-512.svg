<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="diamond-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e8"/>
      <stop offset="50%" stop-color="#c0c0cc"/>
      <stop offset="100%" stop-color="#8888a0"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111114"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg-grad)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="108" ry="108" fill="none" stroke="#c0c0cc" stroke-width="2" stroke-opacity="0.18"/>
  <!-- Diamond shape centered -->
  <polygon points="256,80 408,256 256,432 104,256" fill="url(#diamond-grad)" opacity="0.95"/>
  <!-- Inner diamond cutout for depth -->
  <polygon points="256,148 352,256 256,364 160,256" fill="#080808" opacity="0.45"/>
  <!-- Center highlight -->
  <polygon points="256,180 320,256 256,332 192,256" fill="url(#diamond-grad)" opacity="0.6"/>
</svg>
