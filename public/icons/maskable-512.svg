<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="diamond-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e8"/>
      <stop offset="50%" stop-color="#c0c0cc"/>
      <stop offset="100%" stop-color="#8888a0"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (maskable icons must fill the entire canvas) -->
  <rect width="512" height="512" fill="#080808"/>
  <!-- Safe zone: content within central 80% (approx 52px padding on each side) -->
  <!-- Diamond centered, kept within safe zone ~412x412 centered -->
  <polygon points="256,96 388,256 256,416 124,256" fill="url(#diamond-grad)" opacity="0.95"/>
  <!-- Inner diamond cutout -->
  <polygon points="256,160 344,256 256,352 168,256" fill="#080808" opacity="0.45"/>
  <!-- Center highlight -->
  <polygon points="256,192 312,256 256,320 200,256" fill="url(#diamond-grad)" opacity="0.6"/>
</svg>
